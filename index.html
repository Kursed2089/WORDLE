<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="https://kursed2089.github.io/WORDLE/icon.png">
<title>Wordle UK Clean Fixed</title>

<style>
:root {
  --bg: white;
  --text: #111;
  --tile-border: #d3d6da;
  --key-bg: #d3d6da;
}

body {
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  margin: 0;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  padding-top: 10px;

  overscroll-behavior: none; 
}

.container {
  width: 100%;
  max-width: 500px;
  padding: 8px;
  box-sizing: border-box;
  text-align: center;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

h1 {
  font-size: 28px;
  margin: 0;
}

#status {
  min-height: 20px;
  font-size: 14px;
  color: #444;
  padding: 0 10px;
}
    
#streakDisplay {
  font-size: 14px;
  font-weight: bold;
  color: #444;
}

#game {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 5px;
}

.row {
  display: flex;
  justify-content: center;
  gap: 6px;
}

.tile {
  width: 58px;
  height: 58px;
  border: 2px solid var(--tile-border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  font-weight: bold;
  text-transform: uppercase;
  perspective: 1000px;
  transition: transform 0.6s, background 0.2s ease;
  box-sizing: border-box;
  user-select: none;
}

body.dark {
  --bg: #121213;
  --text: #ffffff;
  --tile-border: #3a3a3c;
  --key-bg: #818384;
}

.correct {
  background: #6aaa64;
  color: white;
  border-color: #6aaa64;
}

.present {
  background: #c9b458;
  color: white;
  border-color: #c9b458;
}

.absent {
  background: #787c7e;
  color: white;
  border-color: #787c7e;
}

#keyboard {
  margin-top: 5px;
  width: 100%;
}

.key-row {
  display: flex;
  justify-content: center;
  gap: 4px;
  margin: 4px 0;
  width: 100%;
}

.key {
  height: 54px;
  flex: 1;
  max-width: 44px;
  border-radius: 4px;
  background: var(--key-bg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  cursor: pointer;
  user-select: none;
  text-transform: uppercase;
  font-size: 14px;

  touch-action: manipulation; 
}

.key:hover {
  filter: brightness(0.95);
}

.wide {
  flex: 1.5;
  max-width: 65px;
}

.key.correct {
  background: #6aaa64;
  color: white;
}

.key.present {
  background: #c9b458;
  color: white;
}

.key.absent {
  background: #787c7e;
  color: white;
}

@keyframes flip {
  0% { transform: rotateX(0); }
  45% { transform: rotateX(90deg); }
  55% { transform: rotateX(90deg); }
  100% { transform: rotateX(0); }
}

.tile.flip {
  animation: flip 0.5s ease;
  transform-origin: center;
}

@keyframes pop {
  0% { transform: scale(1); border-color: var(--tile-border); }
  50% { transform: scale(1.14); border-color: #565758; }
  100% { transform: scale(1); border-color: #565758; }
}

.tile.pop {
  animation: pop 0.1s ease-in-out;
}

@keyframes bounce {
  0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
  40% { transform: translateY(-15px); }
  60% { transform: translateY(-7px); }
}

.tile.bounce {
  animation: bounce 0.6s ease;
}

@keyframes shake {
  0% { transform: translateX(0); }
  20% { transform: translateX(-5px); }
  40% { transform: translateX(5px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
  100% { transform: translateX(0); }
}

.shake {
  animation: shake 0.25s ease;
}

.ctrl-btn {
  padding: 6px 10px;
  font-size: 13px;
  cursor: pointer;
  margin: 2px;
  border: 1px solid #ccc;
  border-radius: 4px;
  background: #f7f7f7;
  touch-action: manipulation; 
}

#shareBtn {
  background-color: #6aaa64;
  color: white;
  border: none;
  border-radius: 4px;
  font-weight: bold;
  display: none;
  touch-action: manipulation;
}

#shareBtn:hover {
  background-color: #5c9357;
}

@media (max-width: 480px) {
  .tile {
    width: 17vw;
    height: 17vw;
    max-width: 58px;
    max-height: 58px;
    font-size: 24px;
  }
  .key {
    height: 50px;
    font-size: 13px;
  }
}
</style>
</head>
<body>

<div class="container">
  <h1>Wordle UK</h1>
  <div id="status"></div>
  <div id="streakDisplay"></div>
  <div id="game"></div>

  <div>
    <button type="button" class="ctrl-btn" onclick="useHint()">💡 Hint</button>
    <button type="button" class="ctrl-btn" onclick="resetGame()">🔁 Replay</button>
    <button type="button" class="ctrl-btn" onclick="toggleKeyboard()" id="kbdBtn">⌨️ Keyboard: ON</button>
    <button type="button" class="ctrl-btn" onclick="toggleSound()" id="soundBtn">🔊 Sound: ON</button>
    <button type="button" class="ctrl-btn" onclick="toggleTheme()">🌙 Theme</button>
    <button type="button" class="ctrl-btn" id="shareBtn" onclick="shareScore()">📋 Copy Results</button>
  </div>

  <div id="keyboard"></div>
</div>

<script>

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/WORDLE/sw.js")
    .then(() => console.log("Service Worker Active - Offline Mode Initialised"))
    .catch((err) => console.log("Service worker registration failed", err));
}

let word = "";
let tries = 0;
let currentGuess = "";
let gameReady = false;
let gameOver = false;
let keyboardEnabled = true;
let isSubmitting = false;
let sessionId = 0; 
let soundEnabled = true;
let streak = parseInt(localStorage.getItem("streak") || "0");
let bestStreak = parseInt(localStorage.getItem("bestStreak") || "0");
let shareGrid = []; 
let allowedWordsSet = new Set();

const offlineWords = [
  "APPLE", "BEACH", "CHAIR", "CLOUD", "HOUSE", "PLANT", "LIGHT", "SMILE", "TRAIN", "WATER",
  "BREAD", "CLOCK", "DANCE", "EARTH", "FLAME", "GRASS", "HEART", "JUICE", "MUSIC", "NIGHT",
  "PAPER", "QUEEN", "RIVER", "SHIRT", "TABLE", "UNCLE", "VOICE", "WINDY", "YOUTH", "ZEBRA",
  "ABOUT", "ABOVE", "ANGRY", "ANIMAL", "BASIC", "BOARD", "CLEAN", "CROSS", "DRIVE", "EARLY",
  "FAVOR", "FIELD", "FLIGHT", "FOCUS", "FRONT", "GLASS", "GREEN", "HAPPY", "IMAGE", "LUNCH",
  "MATCH", "MODEL", "MOTOR", "MOUTH", "ORDER", "PARTY", "PEACE", "PHONE", "PHRASE", "PIECE",
  "PILOT", "PITCH", "PLACE", "PLAIN", "PLANE", "POINT", "POUND", "POWER", "PRESS", "PRICE",
  "PRIDE", "PRIZE", "PROUD", "PROVE", "QUEEN", "QUICK", "QUIET", "QUITE", "RADIO", "RAISE",
  "RANGE", "RATIO", "REACH", "RELAX", "REPLY", "ROUTE", "ROUGH", "ROUND", "ROYAL", "RULER",
  "SCALE", "SCENE", "SCOPE", "SCORE", "SENSE", "SHAPE", "SHARE", "SHARP", "SHEEP", "SHELF",
  "SHIFT", "SHINE", "SHIRT", "SHOCK", "SHOOT", "SHORE", "SHORT", "SHOUT", "SHOVE", "SIGHT",
  "SKILL", "SLEEP", "SLIDE", "SMALL", "SMART", "SMELL", "SMOKE", "SOLID", "SOLVE", "SOUND",
  "SOUTH", "SPACE", "SPARE", "SPEAK", "SPEED", "SPEND", "SPICE", "SPIRE", "SPLIT", "SPOKE",
  "SPORT", "STAFF", "STAGE", "STAIR", "STAKE", "STALE", "STAND", "STARE", "START", "STATE",
  "STEAM", "STEEL", "STEEP", "STEER", "STEMS", "STICK", "STIFF", "STILL", "STING", "STOCK",
  "STONE", "STOOD", "STOOL", "STOOP", "STORE", "STORM", "STORY", "STRIP", "STUCK", "STUDY",
  "STUFF", "STYLE", "SUGAR", "SUITE", "SUITS", "SUNNY", "SUPER", "SWEET", "SWEPT", "SWIFT",
  "SWING", "SWORD", "TABLE", "TAKEN", "TALES", "TALKED", "TALLER", "TASTE", "TASTY", "TAXES"
];

let stats = JSON.parse(localStorage.getItem("stats")) || {
  played: 0,
  wins: 0,
  losses: 0
};

const maxTries = 5;
const keyboardState = {};
let audioCtx = null;

function ensureAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === "suspended") audioCtx.resume();
  return audioCtx;
}

function playTone(freq, duration, { type = "sine", volume = 0.15, delay = 0 } = {}) {
  if (!soundEnabled) return;
  try {
    const ctx = ensureAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    osc.connect(gain);
    gain.connect(ctx.destination);

    const startTime = ctx.currentTime + delay;
    gain.gain.setValueAtTime(volume, startTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);
    osc.start(startTime);
    osc.stop(startTime + duration);
  } catch (e) {
    console.log("Audio failed to execute offline safely");
  }
}

function playKeyClick() {
  if (soundEnabled) ensureAudio();
  playTone(500, 0.05, { type: "square", volume: 0.06 });
}

function playTileReveal(i, result) {
  const freq = result === "correct" ? 520 : result === "present" ? 400 : 260;
  playTone(freq, 0.12, { type: "sine", volume: 0.12, delay: i * 0.12 });
}

function playWin() {
  [523.25, 659.25, 783.99, 1046.5].forEach((f, i) =>
    playTone(f, 0.22, { type: "triangle", volume: 0.15, delay: i * 0.13 })
  );
}

function playLose() {
  [392, 329.63, 261.63].forEach((f, i) =>
    playTone(f, 0.3, { type: "sawtooth", volume: 0.1, delay: i * 0.18 })
  );
}

function playInvalid() {
  playTone(150, 0.18, { type: "sawtooth", volume: 0.12 });
}

function triggerHaptic(pattern) {
  if (navigator.vibrate) {
    navigator.vibrate(pattern);
  }
}

function toggleSound() {
  soundEnabled = !soundEnabled;
  document.getElementById("soundBtn").textContent = soundEnabled ? "🔊 Sound: ON" : "🔇 Sound: OFF";
  if (soundEnabled) ensureAudio();
}

async function loadAllowedWords() {
  try {
    const response = await fetch("https://raw.githubusercontent.com/tabatkins/wordle-list/main/words");
    const text = await response.text();
    const wordsArray = text.split("\n").map(w => w.trim().toUpperCase()).filter(w => w.length === 5);
    allowedWordsSet = new Set(wordsArray);
  } catch (e) {
    console.log("Device is running offline. Initializing localized fallback word set.");
    allowedWordsSet = new Set(offlineWords);
  }
}

async function getWord(){
  try {
    const res = await fetch("https://random-word-api.herokuapp.com/word?number=1&length=5");
    const data = await res.json();
    return data[0].toUpperCase();
  } catch (e) {
    return offlineWords[Math.floor(Math.random() * offlineWords.length)];
  }
}

async function startGame(){
  updateStreakDisplay();
  setStatus("Initializing dictionary...");
  await loadAllowedWords();
  word = await getWord();
  setStatus("");
  gameReady = true;
}

async function isValid(w) {
  const upperW = w.toUpperCase();
  if (upperW === word || allowedWordsSet.has(upperW) || offlineWords.includes(upperW)) return true;

  try {
    const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${w}`);
    if (res.status === 429) return true;
    return res.ok;
  } catch (e) {
    return true;
  }
}

async function getDefinition(word){
  try {
    const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
    const data = await res.json();
    return data[0]?.meanings?.[0]?.definitions?.[0]?.definition || "No definition found.";
  } catch {
    return "Offline: Definitions unavailable.";
  }
}

function createGrid() {
  const game = document.getElementById("game");
  game.innerHTML = "";
  for (let i = 0; i < maxTries; i++) {
    const row = document.createElement("div");
    row.className = "row";
    for (let j = 0; j < 5; j++) {
      const tile = document.createElement("div");
      tile.className = "tile";
      row.appendChild(tile);
    }
    game.appendChild(row);
  }
}

function setStatus(msg) {
  document.getElementById("status").textContent = msg;
}

function updateStreakDisplay() {
  document.getElementById("streakDisplay").textContent = `🔥 ${streak} | 🏆 ${bestStreak}`;
}

const layout = ["QWERTYUIOP","ASDFGHJKL","ZXCVBNM"];

function createKeyboard() {
  const kb = document.getElementById("keyboard");
  kb.innerHTML = "";

  layout.forEach(row => {
    const div = document.createElement("div");
    div.className = "key-row";
    row.split("").forEach(l => {
      const k = document.createElement("div");
      k.className = "key";
      k.textContent = l;
      k.id = "key-" + l;
      k.onclick = () => handleKey(l);
      div.appendChild(k);
    });
    kb.appendChild(div);
  });

  const bottom = document.createElement("div");
  bottom.className = "key-row";

  const enter = document.createElement("div");
  enter.className = "key wide";
  enter.textContent = "ENTER";
  enter.onclick = submitGuess;

  const back = document.createElement("div");
  back.className = "key wide";
  back.textContent = "⌫";
  back.onclick = backspace;

  bottom.appendChild(enter);
  bottom.appendChild(back);
  kb.appendChild(bottom);
}

function handleKey(l) {
  if (!gameReady || gameOver || isSubmitting) return;
  if (tries >= maxTries) return;

  if (currentGuess.length < 5) {
    currentGuess += l;
    playKeyClick();
    triggerHaptic(10); 
    updateRow(true); 
  }
}

function backspace() {
  if (!gameReady || gameOver || isSubmitting) return;
  currentGuess = currentGuess.slice(0, -1);
  playKeyClick();
  triggerHaptic(15);
  updateRow(false);
}

function updateRow(isPop = false) {
  const rows = document.querySelectorAll(".row");
  const row = rows[tries];
  if (!row) return;

  const tiles = row.querySelectorAll(".tile");
  for (let i = 0; i < 5; i++) {
    const prevChar = tiles[i].textContent;
    const nextChar = currentGuess[i] || "";
    tiles[i].textContent = nextChar;

    if (isPop && nextChar && !prevChar && i === currentGuess.length - 1) {
      tiles[i].classList.remove("pop");
      void tiles[i].offsetWidth; 
      tiles[i].classList.add("pop");
    } else if (!nextChar) {
      tiles[i].classList.remove("pop");
    }
  }
}

function updateKeyboard(guessArr, resultArr) {
  for (let i = 0; i < 5; i++) {
    const letter = guessArr[i];
    const result = resultArr[i];
    const prev = keyboardState[letter];

    if (prev === "correct") continue;
    if (prev === "present" && result === "absent") continue;

    keyboardState[letter] = result;
    const el = document.getElementById("key-" + letter);
    if (el) {
      el.classList.remove("correct","present","absent");
      el.classList.add(result);
    }
  }
}

function useHint() {
  if (gameOver || !gameReady || tries >= maxTries || isSubmitting) return;
  const rows = document.querySelectorAll(".row");
  const row = rows[tries];
  const tiles = row.querySelectorAll(".tile");

  for (let i = 0; i < 5; i++) {
    if (!tiles[i].textContent) {
      tiles[i].textContent = word[i];
      tiles[i].classList.add("correct");
      let g = currentGuess.split("");
      g[i] = word[i];
      currentGuess = g.join("");
      setStatus("Hint used!");
      setTimeout(() => setStatus(""), 1500);
      return;
    }
  }
  setStatus("No empty hint slots left");
  setTimeout(() => setStatus(""), 1500);
}

async function submitGuess() {
  if (gameOver || !gameReady || !word || isSubmitting) return;
  if (currentGuess.length !== 5) return;

  const mySession = sessionId; 
  isSubmitting = true;

  const guess = currentGuess.toLowerCase();
  const rows = document.querySelectorAll(".row");
  const currentRowElement = rows[tries];
  const valid = await isValid(guess);

  if (mySession !== sessionId) return;

  if (!valid) {
    setStatus("Not a valid English word");
    playInvalid();
    triggerHaptic([80, 50, 80]); 
    if (currentRowElement) shakeRow(currentRowElement);
    isSubmitting = false;
    setTimeout(() => {
      if (!gameOver && mySession === sessionId) setStatus("");
    }, 2500);
    return;
  }

  const guessArr = guess.toUpperCase().split("");
  const wordArr = word.split("");
  const result = Array(5).fill("absent");
  const used = Array(5).fill(false);

  for (let i = 0; i < 5; i++) {
    if (guessArr[i] === wordArr[i]) {
      result[i] = "correct";
      used[i] = true;
    }
  }

  for (let i = 0; i < 5; i++) {
    if (result[i] === "correct") continue;
    for (let j = 0; j < 5; j++) {
      if (!used[j] && guessArr[i] === wordArr[j]) {
        result[i] = "present";
        used[j] = true;
        break;
      }
    }
  }

  let rowEmojis = "";
  result.forEach(res => {
    if (res === "correct") rowEmojis += "🟩";
    else if (res === "present") rowEmojis += "🟨";
    else rowEmojis += "⬛";
  });
  shareGrid.push(rowEmojis);

  const tiles = currentRowElement.querySelectorAll(".tile");
  for (let i = 0; i < 5; i++) {
    setTimeout(() => {
      if (mySession !== sessionId) return;
      tiles[i].textContent = guessArr[i];
      tiles[i].classList.remove("pop");
      tiles[i].classList.add(result[i], "flip");
      playTileReveal(i, result[i]);
    }, i * 200);
  }

  setTimeout(async () => {
    if (mySession !== sessionId) return;
    updateKeyboard(guessArr, result);

    if (guessArr.join("") === word) {
      tries++;
      currentGuess = "";
      isSubmitting = false;
      tiles.forEach((tile, index) => {
        setTimeout(() => { tile.classList.add("bounce"); }, index * 100);
      });
      await endGame(true, mySession);
      return;
    }

    tries++;
    currentGuess = "";
    if (tries >= maxTries) {
      isSubmitting = false;
      await endGame(false, mySession);
      return;
    }
    isSubmitting = false;
  }, 1000);
}

async function endGame(win, mySession){
  gameOver = true;
  setStatus("Loading definition...");

  if (win) {
    streak++;
    if (streak > bestStreak) bestStreak = streak;
    stats.wins++;
    playWin();
  } else {
    streak = 0;
    stats.losses++;
    playLose();
  }
  stats.played++;

  localStorage.setItem("streak", streak);
  localStorage.setItem("bestStreak", bestStreak);
  localStorage.setItem("stats", JSON.stringify(stats));

  const def = await getDefinition(word);
  if (mySession !== sessionId) return;

  updateStreakDisplay();
  setStatus((win ? "🎉 You Win! " : "💥 Game Over - ") + word + " → " + def);
  document.getElementById("shareBtn").style.display = "inline-block";
}

function shareScore() {
  const totalTriesDisplay = gameOver && tries <= maxTries ? tries : "X";
  let textToCopy = `Wordle UK ${totalTriesDisplay}/${maxTries}\n\n`;
  textToCopy += shareGrid.join("\n");
  
  navigator.clipboard.writeText(textToCopy).then(() => {
    const shareBtn = document.getElementById("shareBtn");
    const origText = shareBtn.textContent;
    shareBtn.textContent = "✅ Copied!";
    setTimeout(() => { shareBtn.textContent = origText; }, 2000);
  }).catch(err => {
    console.error("Could not copy stats text: ", err);
  });
}

async function resetGame(){
  sessionId++; 
  tries = 0;
  currentGuess = "";
  gameOver = false;
  isSubmitting = false;
  shareGrid = [];
  setStatus("");
  document.getElementById("shareBtn").style.display = "none";

  createGrid();
  keyboardStateReset();
  updateStreakDisplay();

  gameReady = false;
  word = await getWord();
  gameReady = true;
}

function keyboardStateReset() {
  Object.keys(keyboardState).forEach(k => {
    keyboardState[k] = null;
    const el = document.getElementById("key-" + k);
    if (el) el.classList.remove("correct", "present", "absent");
  });
}

function toggleTheme() {
  document.body.classList.toggle("dark");
  const isDark = document.body.classList.contains("dark");
  localStorage.setItem("theme", isDark ? "dark" : "light");
  document.querySelector('[onclick="toggleTheme()"]').textContent = isDark ? "☀️ Light Mode" : "🌙 Dark Mode";
}

function shakeRow(row) {
  row.classList.remove("shake");
  void row.offsetWidth; 
  row.classList.add("shake");
}

document.addEventListener("keydown", function (e) {
  if (gameOver || !gameReady || !keyboardEnabled || isSubmitting) return;
  const key = e.key;

  if (/^[a-zA-Z]$/.test(key)) {
    if (currentGuess.length < 5 && tries < maxTries) {
      currentGuess += key.toUpperCase();
      playKeyClick();
      updateRow(true); 
    }
    return;
  }

  if (key === "Backspace") {
    if (tries < maxTries) {
      currentGuess = currentGuess.slice(0, -1);
      playKeyClick();
      updateRow(false);
    }
    return;
  }

  if (key === "Enter") {
    submitGuess();
    return;
  }
});

function toggleKeyboard() {
  keyboardEnabled = !keyboardEnabled;
  const btn = document.getElementById("kbdBtn");
  btn.textContent = keyboardEnabled ? "⌨️ Keyboard: ON" : "⌨️ Keyboard: OFF";
  setStatus(keyboardEnabled ? "Keyboard enabled" : "Keyboard disabled");
  setTimeout(() => { if(!gameOver && currentGuess==="") setStatus(""); }, 1500);
}

if (localStorage.getItem("theme") === "dark") {
  document.body.classList.add("dark");
}

createGrid();
createKeyboard();
startGame();

document.querySelectorAll(".ctrl-btn").forEach(btn => {
  btn.addEventListener("click", () => btn.blur());
});
</script>

</body>
</html>
